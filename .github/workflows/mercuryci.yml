name: MercuryCI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  statuses: write

jobs:
  cosmic-check:
    name: "🪐 Cosmic Readiness Check"
    runs-on: ubuntu-latest
    outputs:
      mercury_retrograde: ${{ steps.astro.outputs.mercury_retrograde }}
      moon_phase: ${{ steps.astro.outputs.moon_phase }}
      moon_emoji: ${{ steps.astro.outputs.moon_emoji }}
      merge_blocked: ${{ steps.astro.outputs.merge_blocked }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check planetary alignment
        id: astro
        run: |
          python - <<'EOF'
          import json, os
          from mercury_check import get_cosmic_status

          status = get_cosmic_status()
          outputs = {
              "mercury_retrograde": str(status.mercury_retrograde).lower(),
              "moon_phase": status.moon_phase.label,
              "moon_emoji": status.moon_phase.emoji,
              "merge_blocked": str(status.merge_blocked).lower(),
              "tooltip": status.merge_button_tooltip(),
              "slack_header": status.slack_header(),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              for key, val in outputs.items():
                  f.write(f"{key}={val}\n")

          print(f"Cosmic status: {status.slack_header()}")
          print(f"Merge blocked: {status.merge_blocked}")
          EOF

      - name: Post cosmic status comment
        uses: actions/github-script@v7
        with:
          script: |
            const retrograde = '${{ steps.astro.outputs.mercury_retrograde }}' === 'true';
            const moonEmoji = '${{ steps.astro.outputs.moon_emoji }}';
            const moonPhase = '${{ steps.astro.outputs.moon_phase }}';
            const blocked = '${{ steps.astro.outputs.merge_blocked }}' === 'true';

            let body;
            if (blocked) {
              body = [
                `## ${moonEmoji} MercuryCI — Merge Blocked`,
                ``,
                `**Mercury is in retrograde.** The merge button has been spiritually disabled.`,
                ``,
                `> *Not today, bestie.*`,
                ``,
                `Current moon: **${moonPhase}**`,
                ``,
                `The pipeline will complete, but the cosmos ask you to wait.`,
                `Use \`[override-cosmos]\` in your PR description only if you truly must.`,
              ].join('\n');
            } else {
              body = [
                `## ${moonEmoji} MercuryCI — Cosmically Clear`,
                ``,
                `Mercury is direct. The moon is in **${moonPhase}**. You may proceed.`,
              ].join('\n');
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  empathy-build:
    name: "💙 Empathy Compiler"
    runs-on: ubuntu-latest
    needs: cosmic-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || true

      - name: Run build with Empathy Compiler
        run: |
          python - <<'EOF'
          import subprocess, sys, time
          from empathy_compiler import compile_with_empathy, EmpathyError

          print("[MercuryCI] Beginning build. Take a breath. We're in this together.")
          time.sleep(1)

          result = subprocess.run(
              ["python", "-m", "pytest", "--tb=no", "-q"],
              capture_output=True,
              text=True,
          )

          if result.returncode != 0:
              # Parse errors into EmpathyError objects (simplified)
              errors = [
                  EmpathyError(
                      error_type="default",
                      line=None,
                      raw_message=result.stderr or result.stdout,
                      mercury_retrograde='${{ needs.cosmic-check.outputs.mercury_retrograde }}' == 'true',
                      empathy_level="high",
                  )
              ]
              compile_with_empathy(errors)
              sys.exit(1)
          else:
              print("\n  Build passed. The code is well. Take a moment to appreciate that.\n")
          EOF

  retrograde-gate:
    name: "🚫 Mercury Retrograde Gate"
    runs-on: ubuntu-latest
    needs: [cosmic-check, empathy-build]
    steps:
      - name: Evaluate merge eligibility
        run: |
          BLOCKED="${{ needs.cosmic-check.outputs.merge_blocked }}"
          OVERRIDE="${{ contains(github.event.pull_request.body, '[override-cosmos]') }}"

          if [ "$BLOCKED" = "true" ] && [ "$OVERRIDE" != "true" ]; then
            echo "::error::${{ needs.cosmic-check.outputs.moon_emoji }} Merge blocked: Mercury is in retrograde."
            echo "::error::Add [override-cosmos] to your PR description to proceed anyway."
            exit 1
          elif [ "$BLOCKED" = "true" ] && [ "$OVERRIDE" = "true" ]; then
            echo "::warning::Override detected. Proceeding despite retrograde. The pipeline has noted this."
          else
            echo "All cosmic conditions satisfied. The merge is yours."
          fi

  slack-notify:
    name: "📡 Slack Notification"
    runs-on: ubuntu-latest
    needs: [cosmic-check, empathy-build, retrograde-gate]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send cosmic Slack notification
        env:
          SLACK_WEBHOOK: ${{ secrets.MERCURYCI_SLACK_WEBHOOK }}
        run: |
          python - <<'EOF'
          import os
          from mercury_check import get_cosmic_status
          from slack_notifier import PREvent, notify
          from birth_chart import fetch_chart_from_github

          webhook = os.environ.get("SLACK_WEBHOOK")
          if not webhook:
              print("[MercuryCI] No Slack webhook configured. Skipping notification.")
              exit(0)

          status = get_cosmic_status()
          author = "${{ github.event.pull_request.user.login }}"
          chart = fetch_chart_from_github(author, os.environ.get("GITHUB_TOKEN"))

          pr = PREvent(
              pr_number=${{ github.event.pull_request.number }},
              pr_title="${{ github.event.pull_request.title }}",
              author=author,
              repo="${{ github.repository }}",
              url="${{ github.event.pull_request.html_url }}",
              birth_chart=chart,
              build_passed="${{ needs.empathy-build.result }}" == "success",
              error_summary="has good bones but needs time" if "${{ needs.empathy-build.result }}" != "success" else None,
          )

          success = notify(webhook, pr, status)
          print(f"[MercuryCI] Slack notification {'sent' if success else 'failed'}.")
          EOF
